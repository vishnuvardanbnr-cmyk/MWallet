<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080604"/>
      <stop offset="100%" stop-color="#0e0b06"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="35%" stop-color="#f0c040"/>
      <stop offset="65%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a07820"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#7a5c10"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a07820"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient gold glows -->
  <circle cx="150" cy="150" r="220" fill="#d4af37" opacity="0.05"/>
  <circle cx="1050" cy="480" r="270" fill="#c9a227" opacity="0.04"/>
  <circle cx="600" cy="580" r="200" fill="#f0c040" opacity="0.03"/>

  <!-- Gold crest logo -->
  <g transform="translate(472, 155)">
    <!-- Shield outer -->
    <path d="M128 8 L218 52 L218 144 C218 200 172 240 128 248 C84 240 38 200 38 144 L38 52 Z" fill="url(#goldDark)" opacity="0.9"/>
    <!-- Shield inner -->
    <path d="M128 20 L206 60 L206 144 C206 196 164 232 128 240 C92 232 50 196 50 144 L50 60 Z" fill="#0d0a05" stroke="url(#goldGrad)" stroke-width="2"/>
    <!-- Top bar -->
    <rect x="88" y="62" width="80" height="5" rx="2.5" fill="url(#goldGrad)" opacity="0.8"/>
    <!-- Ornate M -->
    <path d="M72 186 L72 90 L90 90 L128 148 L166 90 L184 90 L184 186 L166 186 L166 124 L134 172 L122 172 L90 124 L90 186 Z" fill="url(#goldGrad)"/>
    <!-- Bottom bar -->
    <rect x="88" y="196" width="80" height="5" rx="2.5" fill="url(#goldGrad)" opacity="0.8"/>
    <!-- Top gem -->
    <circle cx="128" cy="42" r="7" fill="url(#goldGrad)" opacity="0.95"/>
  </g>

  <text x="600" y="480" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="80" fill="url(#titleGrad)" letter-spacing="6">M-VAULT</text>

  <text x="600" y="535" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="400" font-size="26" fill="#9a7c30" letter-spacing="4">SECURE · DEFI · EARN</text>

  <text x="600" y="590" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="300" font-size="20" fill="#5a4820" letter-spacing="1">Crypto Staking &amp; MLM Rewards on BNB Smart Chain</text>
</svg>
